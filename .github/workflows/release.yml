name: release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main' || startsWith( github.ref, 'refs/heads/release/' )
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:3.4
        ports:
          - 4566:4566
        env:
          SERVICES: s3,dynamodb,sns,kinesis
          DEFAULT_REGION: eu-west-1

    env:
      DYNAMODB_ENDPOINT: http://localhost:4566
      SNS_ENDPOINT: http://localhost:4566
      S3_ENDPOINT: http://localhost:4566
      KINESIS_ENDPOINT: http://localhost:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: eu-west-1

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: "0"
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "corretto"
      - uses: sbt/setup-sbt@v1
      - name: Restore dependencies
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
          key: sbt-${{ hashFiles('**/*.sbt', 'project/build.properties') }}
      - name: Wait for localstack to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"kinesis": "available"'; then
              echo "Localstack is ready"
              break
            fi
            echo "Waiting for localstack... ($i/30)"
            sleep 2
          done
      - name: Build and test
        run: sbt "scalafmtCheckAll;Test/compile;Test/test"
      - run: git fetch --tags
      - run: git status
      - name: Bump version and push tag
        id: tag-version
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          TAG_CONTEXT: branch
      - name: Create a GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag-version.outputs.new_tag }}
          name: ${{ steps.tag-version.outputs.new_version }}
          body: ${{ steps.tag-version.outputs.changelog }}
          skipIfReleaseExists: true
      - run: git fetch --tags
      - run: echo $PGP_SECRET | base64 -d | gpg --import
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
      - name: Publish to Maven Central
        run: sbt "+publishSigned; sonaUpload"
        env:
          SONATYPE_USERNAME: ${{ vars.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
