name: main

on:
  push:
    branches:
      - main
      - release/*

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:3.4
        ports:
          - 4566:4566
        env:
          SERVICES: s3,dynamodb,sns,kinesis
          DEFAULT_REGION: eu-west-1

    env:
      DYNAMODB_ENDPOINT: http://localhost:4566
      SNS_ENDPOINT: http://localhost:4566
      S3_ENDPOINT: http://localhost:4566
      KINESIS_ENDPOINT: http://localhost:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: eu-west-1

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "corretto"
      - uses: sbt/setup-sbt@v1
      - name: Restore dependencies
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
          key: sbt-${{ hashFiles('**/*.sbt', 'project/build.properties') }}
      - name: Update dependencies
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: sbt +update
      - name: Cache dependencies
        uses: actions/cache/save@v5
        if: steps.cache-restore.outputs.cache-hit != 'true'
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
          key: sbt-${{ hashFiles('**/*.sbt', 'project/build.properties') }}
      - name: Wait for localstack to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"kinesis": "available"'; then
              echo "Localstack is ready"
              break
            fi
            echo "Waiting for localstack... ($i/30)"
            sleep 2
          done
      - name: Build and test
        run: sbt "scalafmtCheckAll;Test/compile;Test/test"
