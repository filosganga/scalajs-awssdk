name: main

on:
  push:
    branches:
      - main
      - release/*

concurrency:
  group: ${{ github.ref }}

permissions:
  id-token: write
  contents: write
  checks: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  publish:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:3.4
        ports:
          - 4566:4566
        env:
          SERVICES: s3,dynamodb,sns,kinesis
          DEFAULT_REGION: eu-west-1

    env:
      DYNAMODB_ENDPOINT: http://localhost:4566
      SNS_ENDPOINT: http://localhost:4566
      S3_ENDPOINT: http://localhost:4566
      KINESIS_ENDPOINT: http://localhost:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: eu-west-1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "corretto"
      - uses: coursier/setup-action@v1
        with:
          apps: "sbt"
      - uses: coursier/cache-action@v6
      - run: sbt "scalafmtCheckAll;Test/compile;Test/test"
      - uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          list-suites: "all"
          list-tests: "all"
          max-annotations: 10
          fail-on-error: true
          name: unit-tests-reports
          path: "**/target/test-reports/*.xml"
          reporter: java-junit
      - run: git fetch --tags
      - run: git status
      - name: Bump version and push tag
        id: tag-version
        uses: anothrNick/github-tag-action@1.61.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          TAG_CONTEXT: branch
      - name: Create a GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag-version.outputs.new_tag }}
          name: ${{ steps.tag-version.outputs.new_version }}
          body: ${{ steps.tag-version.outputs.changelog }}
      - run: git fetch --tags
      - run: echo $PGP_SECRET | base64 -d | gpg --import
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
      - run: sbt +publishSigned
        env:
          SONATYPE_USER: ${{ secrets.SONATYPE_USER }}
          SONATYPE_PASS: ${{ secrets.SONATYPE_PASS }}
